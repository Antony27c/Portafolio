        <section id="Contacto">
            <h1>Formulario de Contacto</h1>
            <form action="http://127.0.0.1:5000/contacto" method="POST">
                <label for="name">Nombre completo *</label>
                <input type="text" id="name" name="name" placeholder="ej. juan perez" required minlength="3">
                <label for="email">email *</label>
                <input type="email" name="email" id="email" placeholder="ej. pan@gmail.com" required>
                <label for="number">numero de telefono *</label>
                <input type="tel" name="telefono" id="number" placeholder="ej. 387000000" pattern="[0-9]{7,15}" required >
                <label for="residencia">residencia *</label>
                <input type="text" id="residencia" name="residencia" placeholder="Salta Capital" required minlength="5">
                <label for="motivo">Motivo de contacto *</label>
                <select id="motivo" name="motivo" required>
                    <option value="">-- Seleccioná una opción --</option>
                    <option value="consulta">Consulta general</option>
                    <option value="Contacto">Contacto</option>
                    <option value="otro">Otro</option>
                </select>
                <label for="mensaje">mensaje *</label>
                <textarea name="mensaje" id="mensaje" placeholder="ej. me comunico a usted con la razon de:" required minlength="10"></textarea>
                <label>
                    <input type="checkbox" name="Terminos" required>
                    Acepto los Terminos y condiciones *
                </label>
                <button type="submit">Enviar</button>
                
            </form>

        </section>
